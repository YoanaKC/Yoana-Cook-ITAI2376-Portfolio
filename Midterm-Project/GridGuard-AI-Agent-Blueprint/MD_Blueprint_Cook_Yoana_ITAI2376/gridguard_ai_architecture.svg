<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 900" width="1450" height="900">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .title { font-size: 32px; font-weight: 700; fill: #0F172A; text-anchor: middle; }
            .subtitle { font-size: 18px; font-weight: 600; fill: #475569; text-anchor: middle; }
            .box-rect { rx: 12; ry: 12; fill: #ffffff; stroke-width: 3; }
            .data-source { fill: #EFF6FF; stroke: #1E40AF; stroke-width: 2; rx: 8; ry: 8; }
            .data-source-green { fill: #D1FAE5; stroke: #047857; stroke-width: 2; rx: 8; ry: 8; }
            .box-title { font-size: 16px; font-weight: 700; fill: #000; text-anchor: middle; }
            .box-text { font-size: 13px; font-weight: 400; fill: #1E293B; text-anchor: middle; }
            .box-bold { font-weight: 600; fill: #000; }
            .arrow-path { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrowhead); }
            .final-rect { fill: #0F172A; rx: 12; ry: 12; }
            .final-title { font-size: 20px; font-weight: 700; fill: #FEF08A; text-anchor: middle; }
            .final-subtitle { font-size: 15px; font-weight: 500; fill: #FFFFFF; text-anchor: middle; }
            .ds-title { font-size: 13px; font-weight: 700; fill: #000; text-anchor: middle; }
            .ds-text { font-size: 11px; font-weight: 500; fill: #1E293B; text-anchor: middle; }
            .phase-label { font-size: 16px; font-weight: 700; fill: #64748b; text-anchor: middle; letter-spacing: 1px; }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
        <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
          <feDropShadow dx="0" dy="5" stdDeviation="6" flood-opacity="0.06"/>
        </filter>
    </defs>

    <rect width="1450" height="900" fill="#F8FAFC" />

    <text x="725" y="50" class="title">GridGuard-AI Architecture</text>
    <text x="725" y="80" class="subtitle">CrewAI Framework (Fan-Out / Fan-In Parallel Orchestration)</text>

    <!-- Phase Labels -->
    <text x="335" y="115" class="phase-label">PHASE 1 (DATA INPUT)</text>
    <text x="815" y="215" class="phase-label">PHASE 2 (INTELLIGENCE)</text>
    <text x="1215" y="355" class="phase-label">PHASE 3 (DECISION)</text>

    <!-- Agents -->
    <!-- Phase 1 (X=220) -->
    <rect x="220" y="140" width="230" height="200" class="box-rect" stroke="#3B82F6" filter="url(#shadow)" />
    <text x="335" y="175" class="box-title">WEATHER ANALYST</text>
    <text x="335" y="205" class="box-text box-bold">Role:</text>
    <text x="335" y="222" class="box-text">Chief Climate Risk Officer</text>
    <text x="335" y="250" class="box-text box-bold">Tools:</text>
    <text x="335" y="267" class="box-text">fetch_texas_weather()</text>
    <text x="335" y="295" class="box-text box-bold">Model:</text>
    <text x="335" y="312" class="box-text">Groq / Llama-3.3-70B</text>

    <rect x="220" y="380" width="230" height="200" class="box-rect" stroke="#8B5CF6" filter="url(#shadow)" />
    <text x="335" y="415" class="box-title">REGULATORY KNOWLEDGE</text>
    <text x="335" y="445" class="box-text box-bold">Role:</text>
    <text x="335" y="462" class="box-text">Chief Compliance Officer</text>
    <text x="335" y="490" class="box-text box-bold">Tools:</text>
    <text x="335" y="507" class="box-text">search_compliance_database()</text>
    <text x="335" y="535" class="box-text box-bold">Model:</text>
    <text x="335" y="552" class="box-text">Groq / Llama-3.3-70B</text>

    <rect x="220" y="620" width="230" height="200" class="box-rect" stroke="#EAB308" filter="url(#shadow)" />
    <text x="335" y="655" class="box-title">RENEWABLE FORECASTER</text>
    <text x="335" y="685" class="box-text box-bold">Role:</text>
    <text x="335" y="702" class="box-text">Chief Renewable Integrator</text>
    <text x="335" y="730" class="box-text box-bold">Tools:</text>
    <text x="335" y="747" class="box-text">fetch_solar_irradiance()</text>
    <text x="335" y="764" class="box-text">fetch_wind_forecast()</text>
    <text x="335" y="790" class="box-text box-bold">Model:</text>
    <text x="335" y="805" class="box-text">Groq / Llama-3.3-70B</text>

    <!-- Phase 2 (X=700) -->
    <rect x="700" y="240" width="230" height="200" class="box-rect" stroke="#10B981" filter="url(#shadow)" />
    <text x="815" y="275" class="box-title">GRID MONITOR</text>
    <text x="815" y="305" class="box-text box-bold">Role:</text>
    <text x="815" y="322" class="box-text">Chief Reliability Officer</text>
    <text x="815" y="350" class="box-text box-bold">Tools:</text>
    <text x="815" y="367" class="box-text">fetch_ercot_grid_data()</text>
    <text x="815" y="384" class="box-text">predict_expected_load()</text>
    <text x="815" y="412" class="box-text box-bold">Model:</text>
    <text x="815" y="429" class="box-text">Llama-3.3-70B + LSTM</text>

    <rect x="700" y="520" width="230" height="200" class="box-rect" stroke="#06B6D4" filter="url(#shadow)" />
    <text x="815" y="555" class="box-title">MARKET ANALYST</text>
    <text x="815" y="585" class="box-text box-bold">Role:</text>
    <text x="815" y="602" class="box-text">Chief Market Intelligence</text>
    <text x="815" y="630" class="box-text box-bold">Tools:</text>
    <text x="815" y="647" class="box-text">fetch_realtime_prices()</text>
    <text x="815" y="685" class="box-text box-bold">Model:</text>
    <text x="815" y="702" class="box-text">Groq / Llama-3.3-70B</text>

    <!-- Phase 3 (X=1100) -->
    <rect x="1100" y="380" width="230" height="200" class="box-rect" stroke="#F59E0B" filter="url(#shadow)" />
    <text x="1215" y="415" class="box-title">GRID OPERATOR</text>
    <text x="1215" y="445" class="box-text box-bold">Role:</text>
    <text x="1215" y="462" class="box-text">Chief Energy Strategist</text>
    <text x="1215" y="490" class="box-text box-bold">Tools:</text>
    <text x="1215" y="507" class="box-text">read_recent_dispatches()</text>
    <text x="1215" y="524" class="box-text">save_dispatch_report()</text>
    <text x="1215" y="552" class="box-text box-bold">Model:</text>
    <text x="1215" y="569" class="box-text">Groq / Llama-3.3-70B</text>

    <!-- Final Output -->
    <rect x="1065" y="640" width="300" height="75" class="final-rect" filter="url(#shadow)" />
    <text x="1215" y="683" class="final-title">FINAL DISPATCH REPORT</text>
    <text x="1215" y="705" class="final-subtitle">JSON Analysis Output</text>
    <path class="arrow-path" d="M 1215 580 L 1215 630" />

    <!-- Phase 1 Data Sources -->
    <rect x="25" y="212" width="160" height="55" class="data-source" filter="url(#shadow)" />
    <g transform="translate(35, 222)" stroke="#1E40AF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
    </g>
    <text x="120" y="235" class="ds-title">Open-Meteo API</text>
    <text x="120" y="253" class="ds-text">Live Weather Data</text>
    <path class="arrow-path" d="M 185 240 L 215 240" />

    <rect x="25" y="452" width="160" height="55" class="data-source" filter="url(#shadow)" />
    <g transform="translate(38, 461)" stroke="#1E40AF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3"/>
        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
    </g>
    <text x="120" y="475" class="ds-title">Local ChromaDB</text>
    <text x="120" y="493" class="ds-text">NERC/ERCOT PDFs</text>
    <path class="arrow-path" d="M 185 480 L 215 480" />

    <rect x="25" y="692" width="160" height="55" class="data-source" filter="url(#shadow)" />
    <g transform="translate(35, 702)" stroke="#1E40AF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
    </g>
    <text x="120" y="715" class="ds-title">Open-Meteo API</text>
    <text x="120" y="733" class="ds-text">Solar/Wind Forecast</text>
    <path class="arrow-path" d="M 185 720 L 215 720" />

    <!-- Phase 2 Data Sources -->
    <rect x="515" y="259" width="160" height="55" class="data-source-green" filter="url(#shadow)" />
    <g transform="translate(525, 268)" stroke="#065F46" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </g>
    <text x="610" y="282" class="ds-title">GridStatus.io</text>
    <text x="610" y="300" class="ds-text">ERCOT Telemetry</text>
    <path class="arrow-path" d="M 675 286 L 695 286" />

    <rect x="515" y="329" width="160" height="55" class="data-source" filter="url(#shadow)" />
    <g transform="translate(528, 338)" stroke="#1E40AF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3"/>
        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
    </g>
    <text x="610" y="352" class="ds-title">Local Models</text>
    <text x="610" y="370" class="ds-text">LSTM Base Load</text>
    <path class="arrow-path" d="M 675 356 L 695 356" />

    <rect x="515" y="589" width="160" height="55" class="data-source-green" filter="url(#shadow)" />
    <g transform="translate(525, 598)" stroke="#065F46" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </g>
    <text x="610" y="612" class="ds-title">GridStatus.io</text>
    <text x="610" y="630" class="ds-text">Hub Pricing Data</text>
    <path class="arrow-path" d="M 675 616 L 695 616" />

    <!-- Connecting Arrows -->
    <!-- Phase 1 to Phase 3 -->
    <path class="arrow-path" d="M 450 240 L 480 240 L 480 460 L 1090 460" />
    <path class="arrow-path" d="M 450 480 L 1090 480" />
    <path class="arrow-path" d="M 450 720 L 480 720 L 480 500 L 1090 500" />
    
    <!-- Phase 2 to Phase 3 -->
    <path class="arrow-path" d="M 930 340 L 960 340 L 960 470 L 1090 470" />
    <path class="arrow-path" d="M 930 620 L 960 620 L 960 490 L 1090 490" />
</svg>
